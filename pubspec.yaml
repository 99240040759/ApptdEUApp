name: apptd_union
description: "APPTD Employees Union - Official App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  firebase_messaging: ^16.3.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  shimmer: ^3.0.0
  audioplayers: ^6.1.0
  intl: ^0.20.2
  flutter_widget_from_html: ^0.15.2
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  google_sign_in: ^7.2.0
  flutter_local_notifications: ^22.0.0
  path: ^1.9.1
  path_provider: ^2.1.4
  http: ^1.2.2
  package_info_plus: ^8.3.1
  open_filex: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#B91C1C"
  adaptive_icon_foreground: "assets/images/logo.jpg"
  web:
    generate: false
