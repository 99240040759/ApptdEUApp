name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.1)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.keystore
          EOF

      - name: Inject Google Sign-In Web Client ID
        run: |
          sed -i "s|YOUR_WEB_CLIENT_ID_HERE|${{ secrets.GOOGLE_WEB_CLIENT_ID }}|g" lib/services/auth_service.dart

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info

      - name: Rename APK with version tag
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.tag }}"
          cp build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/APPTD-Union-${VERSION}.apk"

      - name: Clean up secrets
        if: always()
        run: |
          rm -f android/app/release.keystore
          rm -f android/key.properties

      - name: Create GitHub Release on sameer786ss/ApptdEUApp
        uses: softprops/action-gh-release@v2
        with:
          repository: sameer786ss/ApptdEUApp
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: "APPTD Union ${{ github.ref_name || github.event.inputs.tag }}"
          body: |
            ## APPTD Employees Union - ${{ github.ref_name || github.event.inputs.tag }}

            ### What's New
            ${{ github.event.head_commit.message || 'New release' }}

            ### Installation
            Download the APK below and install it on your Android device.
            > Enable "Install from unknown sources" if prompted.
          files: build/app/outputs/flutter-apk/APPTD-Union-${{ github.ref_name || github.event.inputs.tag }}.apk
          generate_release_notes: true
          token: ${{ secrets.RELEASE_PAT }}
