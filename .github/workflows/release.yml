name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.1)'
        required: true

env:
  VERSION: ${{ github.ref_name || github.event.inputs.tag }}
  FLUTTER_VERSION: '3.44.2'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup secrets & inject config
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          printf "storePassword=${{ secrets.KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nstoreFile=release.keystore\n" > android/key.properties
          sed -i "s|YOUR_WEB_CLIENT_ID_HERE|${{ secrets.GOOGLE_WEB_CLIENT_ID }}|g" android/app/src/main/res/values/strings.xml

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --obfuscate --split-debug-info=build/debug-info
          cp build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/APPTD-Union-${{ env.VERSION }}.apk"

      - name: Cleanup secrets
        if: always()
        run: rm -f android/app/release.keystore android/key.properties

      - uses: softprops/action-gh-release@v2
        with:
          repository: sameer786ss/ApptdEUApp
          tag_name: ${{ env.VERSION }}
          name: APPTD Union ${{ env.VERSION }}
          body: |
            ## APPTD Employees Union — ${{ env.VERSION }}
            ### What's New
            ${{ github.event.head_commit.message || 'New release' }}
            ### Installation
            Download the APK below and install on your Android device.
            > Enable "Install from unknown sources" if prompted.
          files: build/app/outputs/flutter-apk/APPTD-Union-${{ env.VERSION }}.apk
          generate_release_notes: true
          token: ${{ secrets.RELEASE_PAT }}
